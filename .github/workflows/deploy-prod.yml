name: Deploy Ticketz — Produção

# Um único workflow: só publica o que mudou (API e/ou SPA).
# Evita 3 pipelines paralelos consumindo minutos do GitHub Actions.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "api-worker/**"
      - "functions/**"
      - "scripts/**"
      - ".github/workflows/deploy-prod.yml"
  workflow_dispatch:

concurrency:
  group: ticketz-prod
  cancel-in-progress: true

env:
  WORKER_NAME: fortmax-ticketz-api
  API_HOST: api.fortmax.com.br
  CF_PROJECT_NAME: fortmax-ticketz-prod
  CF_BRANCH: main
  FRONTEND_HOST: suporte.fortmax.com.br

jobs:
  detect-changes:
    name: Detectar alterações
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'api-worker/**'
              - 'scripts/setup-cloudflare-api.mjs'
            frontend:
              - 'frontend/**'
              - 'functions/**'
              - 'scripts/setup-cloudflare-prod.mjs'

  deploy-api:
    name: API → api.fortmax.com.br
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar secrets obrigatórios
        env:
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          set -euo pipefail
          if [ -z "${DB_PASS:-}" ]; then
            echo "::error::Secret DB_PASS ausente. Cadastre em Settings → Secrets → Actions."
            exit 1
          fi

      - name: Provisionar DNS e custom domain (api.fortmax.com.br)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          API_HOST: ${{ env.API_HOST }}
          WORKER_NAME: ${{ env.WORKER_NAME }}
        run: |
          set -euo pipefail
          node scripts/setup-cloudflare-api.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install api-worker dependencies
        working-directory: api-worker
        run: npm install --no-audit --no-fund

      - name: Configurar secret DB_PASS no Worker
        working-directory: api-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          set -euo pipefail
          printf '%s' "$DB_PASS" | npx wrangler secret put DB_PASS

      - name: Deploy Worker + Container
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: api-worker
          command: deploy

      - name: Summary API
        run: |
          echo "## Ticketz API publicada" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://${{ env.API_HOST }}" >> $GITHUB_STEP_SUMMARY

  deploy-spa:
    name: SPA → suporte.fortmax.com.br
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provisionar Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          BACKEND_ORIGIN: ${{ secrets.BACKEND_ORIGIN }}
        run: |
          set -euo pipefail
          node scripts/setup-cloudflare-prod.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build SPA
        working-directory: frontend
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: false
        run: npm run build

      - name: Gerar config.json de produção
        run: cp frontend/public/config-prod.json frontend/build/config.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy frontend/build
            --project-name=${{ env.CF_PROJECT_NAME }}
            --branch=${{ env.CF_BRANCH }}
            --commit-dirty=true

      - name: Purge Cloudflare cache
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -e
          if [ -z "${CF_ZONE_ID:-}" ]; then
            echo "::warning::CLOUDFLARE_ZONE_ID ausente — purge ignorado."
            exit 0
          fi
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}'

      - name: Summary SPA
        run: |
          echo "## Ticketz SPA publicada" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://${{ env.FRONTEND_HOST }}" >> $GITHUB_STEP_SUMMARY
