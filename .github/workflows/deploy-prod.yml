name: Deploy Ticketz — Produção

# Um job único: publica API e/ou SPA conforme paths-filter (sem card SPA vazio).
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "api-worker/**"
      - "functions/**"
      - "scripts/**"
      - ".github/workflows/deploy-prod.yml"
  workflow_dispatch:

concurrency:
  group: ticketz-prod
  cancel-in-progress: true

env:
  WORKER_NAME: fortmax-ticketz-api
  API_HOST: api.fortmax.com.br
  CF_PROJECT_NAME: fortmax-ticketz-prod
  CF_BRANCH: main
  FRONTEND_HOST: suporte.fortmax.com.br

jobs:
  detect-changes:
    name: Detectar alterações
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'api-worker/**'
              - 'scripts/**'
              - '.github/workflows/deploy-prod.yml'
            frontend:
              - 'frontend/**'
              - 'functions/**'
              - 'scripts/setup-cloudflare-prod.mjs'
              - 'scripts/setup-cloudflare-api.mjs'
              - '.github/workflows/deploy-prod.yml'

  deploy-prod:
    name: Deploy produção
    needs: detect-changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.detect-changes.outputs.backend == 'true' ||
      needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DEPLOY_BACKEND: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.backend == 'true' }}
      DEPLOY_FRONTEND: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.frontend == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Plano de deploy
        run: |
          echo "Deploy backend (VPS): ${DEPLOY_BACKEND}"
          echo "Deploy frontend (SPA): ${DEPLOY_FRONTEND}"

      - name: Gerar gitinfo
        run: |
          COMMIT_HASH=$(git rev-parse --short=7 HEAD)
          COMMIT_TS=$(git log -1 --format=%cI)
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          BUILD_TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat <<EOT > backend/src/gitinfo.ts
          export const GitInfo = {
            commitHash: "${COMMIT_HASH}",
            commitTimestamp: "${COMMIT_TS}",
            branchName: "${BRANCH}",
            tagName: "${TAG:-v1.0.x}",
            buildTimestamp: "${BUILD_TS}"
          };
          EOT
          cat <<EOT > frontend/public/gitinfo.json
          {
            "commitHash": "${COMMIT_HASH}",
            "commitTimestamp": "${COMMIT_TS}",
            "branchName": "${BRANCH}",
            "tagName": "${TAG:-v1.0.x}",
            "buildTimestamp": "${BUILD_TS}"
          }
          EOT

      - name: Validar secrets Cloudflare (DNS)
        if: env.DEPLOY_BACKEND == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::Secret CLOUDFLARE_API_TOKEN ausente."
            exit 1
          fi

      - name: Setup Node (backend)
        if: env.DEPLOY_BACKEND == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build backend
        if: env.DEPLOY_BACKEND == 'true'
        working-directory: backend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Garantir DNS + SSL Flexible (Cloudflare) — API
        if: env.DEPLOY_BACKEND == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          VPS_IP: ${{ secrets.CONTABO_VPS_IP }}
          API_HOST: ${{ env.API_HOST }}
        run: |
          set -euo pipefail
          node scripts/setup-cloudflare-api.mjs

      - name: Deploy backend na VPS Contabo
        if: env.DEPLOY_BACKEND == 'true'
        env:
          CONTABO_PASSWORD: ${{ secrets.CONTABO_PASSWORD }}
          CONTABO_HOST: ${{ secrets.CONTABO_VPS_IP }}
          SKIP_WHATSAPP_RESET: "1"
          DEPLOY_MODE: "patch"
          DEPLOY_USE_ZIP: "1"
          DEPLOY_B64_CHUNK: "1500"
          DEPLOY_LOCK_WAIT_SEC: "1800"
        run: |
          set -euo pipefail
          pip install pywinrm
          if [ -z "${CONTABO_PASSWORD:-}" ]; then
            echo "::warning::CONTABO_PASSWORD vazio — deploy usa fallback do script"
            unset CONTABO_PASSWORD
          fi
          CONTABO_HOST="${CONTABO_HOST:-31.220.103.226}"
          CONTABO_HOST="${CONTABO_HOST#https://}"
          CONTABO_HOST="${CONTABO_HOST#http://}"
          CONTABO_HOST="${CONTABO_HOST%%/*}"
          CONTABO_HOST="${CONTABO_HOST%%:*}"
          export CONTABO_HOST
          echo "Deploy target host: ${CONTABO_HOST}"
          python3 scripts/deploy-vps-backend.py

      - name: Corrigir .env PORT/HOST e scripts de start na VPS
        if: env.DEPLOY_BACKEND == 'true'
        env:
          CONTABO_PASSWORD: ${{ secrets.CONTABO_PASSWORD }}
          CONTABO_HOST: ${{ secrets.CONTABO_VPS_IP }}
        run: |
          set -euo pipefail
          pip install pywinrm
          if [ -z "${CONTABO_PASSWORD:-}" ]; then unset CONTABO_PASSWORD; fi
          CONTABO_HOST="${CONTABO_HOST:-31.220.103.226}"
          CONTABO_HOST="${CONTABO_HOST#https://}"
          CONTABO_HOST="${CONTABO_HOST#http://}"
          CONTABO_HOST="${CONTABO_HOST%%/*}"
          CONTABO_HOST="${CONTABO_HOST%%:*}"
          export CONTABO_HOST
          python3 scripts/fix-vps-env-port.py

      - name: Corrigir IIS proxy (api.fortmax.com.br)
        if: env.DEPLOY_BACKEND == 'true'
        env:
          CONTABO_PASSWORD: ${{ secrets.CONTABO_PASSWORD }}
          CONTABO_HOST: ${{ secrets.CONTABO_VPS_IP }}
        run: |
          set -euo pipefail
          pip install pywinrm
          if [ -z "${CONTABO_PASSWORD:-}" ]; then unset CONTABO_PASSWORD; fi
          CONTABO_HOST="${CONTABO_HOST:-31.220.103.226}"
          CONTABO_HOST="${CONTABO_HOST#https://}"
          CONTABO_HOST="${CONTABO_HOST#http://}"
          CONTABO_HOST="${CONTABO_HOST%%/*}"
          CONTABO_HOST="${CONTABO_HOST%%:*}"
          export CONTABO_HOST
          python3 scripts/fix-vps-prod-iis.py

      - name: Aguardar API ficar pronta (VPS)
        if: env.DEPLOY_BACKEND == 'true'
        env:
          CONTABO_PASSWORD: ${{ secrets.CONTABO_PASSWORD }}
          CONTABO_HOST: ${{ secrets.CONTABO_VPS_IP }}
        run: |
          set -euo pipefail
          API_URL="https://${{ env.API_HOST }}"
          EXPECTED_SHA="${{ github.sha }}"
          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 20 "${API_URL}/health" >/dev/null 2>&1; then
              echo "API health OK on attempt ${attempt}"
              curl -fsS --max-time 10 "${API_URL}/health" || true
              VERSION_JSON=$(curl -fsS --max-time 10 "${API_URL}/version" || echo "{}")
              echo "Deployed version: ${VERSION_JSON}"
              DEPLOYED_HASH=$(echo "${VERSION_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('commitHash',''))" 2>/dev/null || echo "")
              EXPECTED_SHORT=$(git rev-parse --short=7 HEAD)
              if [ -n "${DEPLOYED_HASH}" ] && [ "${DEPLOYED_HASH}" = "${EXPECTED_SHORT}" ]; then
                echo "Version match OK: ${DEPLOYED_HASH}"
              else
                echo "::warning::Version hash mismatch (deployed=${DEPLOYED_HASH}, expected=${EXPECTED_SHORT})"
              fi
              exit 0
            fi
            echo "Attempt ${attempt}/30: API ainda aquecendo..."
            sleep 10
          done
          echo "::warning::Health externo falhou — tentando restart na VPS"
          pip install pywinrm
          if [ -z "${CONTABO_PASSWORD:-}" ]; then unset CONTABO_PASSWORD; fi
          CONTABO_HOST="${CONTABO_HOST:-31.220.103.226}"
          CONTABO_HOST="${CONTABO_HOST#https://}"
          CONTABO_HOST="${CONTABO_HOST#http://}"
          CONTABO_HOST="${CONTABO_HOST%%/*}"
          CONTABO_HOST="${CONTABO_HOST%%:*}"
          export CONTABO_HOST
          python3 scripts/restart-vps-backend.py || true
          python3 scripts/fix-vps-prod-iis.py || true
          for attempt in $(seq 1 12); do
            if curl -fsS --max-time 20 "${API_URL}/health" >/dev/null 2>&1; then
              echo "API health OK after recovery on attempt ${attempt}"
              exit 0
            fi
            echo "Recovery attempt ${attempt}/12..."
            sleep 10
          done
          echo "::error::API /health não respondeu — verifique backend na VPS Contabo."
          exit 1

      - name: Provisionar Cloudflare Pages
        if: env.DEPLOY_FRONTEND == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          BACKEND_ORIGIN: ${{ secrets.BACKEND_ORIGIN }}
        run: |
          set -euo pipefail
          node scripts/setup-cloudflare-prod.mjs

      - name: Setup Node (frontend)
        if: env.DEPLOY_FRONTEND == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        if: env.DEPLOY_FRONTEND == 'true'
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build SPA
        if: env.DEPLOY_FRONTEND == 'true'
        working-directory: frontend
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          CI: false
        run: npm run build

      - name: Gerar config.json de produção
        if: env.DEPLOY_FRONTEND == 'true'
        run: |
          cp frontend/public/config-prod.json frontend/build/config.json
          cp frontend/public/gitinfo.json frontend/build/gitinfo.json

      - name: Verificar gitinfo no build
        if: env.DEPLOY_FRONTEND == 'true'
        run: |
          cat frontend/build/gitinfo.json
          HASH=$(python3 -c "import json; print(json.load(open('frontend/build/gitinfo.json'))['commitHash'])")
          EXPECTED=$(git rev-parse --short=7 HEAD)
          if [ "${HASH}" != "${EXPECTED}" ]; then
            echo "::error::gitinfo.json commit mismatch"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        if: env.DEPLOY_FRONTEND == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy frontend/build
            --project-name=${{ env.CF_PROJECT_NAME }}
            --branch=${{ env.CF_BRANCH }}
            --commit-dirty=true

      - name: Purge Cloudflare cache
        if: env.DEPLOY_FRONTEND == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -e
          if [ -z "${CF_ZONE_ID:-}" ]; then
            echo "::warning::CLOUDFLARE_ZONE_ID ausente — purge ignorado."
            exit 0
          fi
          curl -fsS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"purge_everything":true}'

      - name: Summary
        run: |
          echo "## Ticketz deploy produção" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${DEPLOY_BACKEND}" = "true" ]; then
            echo "- API: https://${{ env.API_HOST }}" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${DEPLOY_FRONTEND}" = "true" ]; then
            echo "- SPA: https://${{ env.FRONTEND_HOST }}" >> $GITHUB_STEP_SUMMARY
          fi
