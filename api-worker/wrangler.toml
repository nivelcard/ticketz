name = "fortmax-ticketz-api"
main = "src/index.js"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "TicketzBackend"
image = "../backend/Dockerfile.cloudflare"
max_instances = 3

[[durable_objects.bindings]]
name = "TICKETZ_BACKEND"
class_name = "TicketzBackend"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TicketzBackend"]

[vars]
HOST = "0.0.0.0"
PORT = "3000"
FRONTEND_URL = "https://suporte.fortmax.com.br"
BACKEND_URL = "https://api.fortmax.com.br"
DB_DIALECT = "postgres"
LISTEN_FIRST = "true"
DB_HOST = "aws-0-sa-east-1.pooler.supabase.com"
DB_PORT = "5432"
DB_USER = "postgres.tcwtpkadwrsbdvehsmfy"
DB_CONNECT_TIMEOUT = "15000"
DB_NAME = "postgres"
DB_SCHEMA = "ticketz"
DB_SSL = "true"
DB_SSL_REJECT_UNAUTHORIZED = "false"
DB_TIMEZONE = "-03:00"
DB_MAX_CONNECTIONS = "3"
DB_MIN_CONNECTIONS = "0"
REDIS_URI = "redis://127.0.0.1:6379"
VERIFY_TOKEN = "ticketz"
SOCKET_ADMIN = "true"
TZ = "America/Sao_Paulo"
USER_LIMIT = "10000"
CONNECTIONS_LIMIT = "100000"
CLOSED_SEND_BY_ME = "true"
STORAGE_ROOT_PREFIX = "suporte"
AUTO_MIGRATE = "true"
AI_QUEUE_CONCURRENCY = "5"
AI_QUEUE_DEBOUNCE_MS = "2000"
AI_QUEUE_MAX_ATTEMPTS = "3"
AI_QUEUE_BACKOFF_MS = "3000"
AI_QUEUE_CONGESTION_THRESHOLD = "50"
JWT_ACCESS_EXPIRES_IN = "8h"
JWT_REFRESH_EXPIRES_IN = "30d"
JWT_SECRET = "fortmax-ticketz-access-jwt-v1-7f3a9c2e8b1d4f6a0c5e9b2d7f1a4c8e"
JWT_REFRESH_SECRET = "fortmax-ticketz-refresh-jwt-v1-2b8d4f6a1c9e3b7d0f5a8c2e6b4d1f9a"
TURNSTILE_SITE_KEY = "0x4AAAAAADhSILt9PsBiVeID"

[[routes]]
pattern = "api.fortmax.com.br/*"
zone_name = "fortmax.com.br"
